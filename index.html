<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#C25B2F">
  <meta name="description" content="Spontaneous road trips from Fort Wayne. Pick a drive time and go.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Unscheduled">

  <!-- Open Graph -->
  <meta property="og:title" content="Unscheduled — Go when the feeling hits.">
  <meta property="og:description" content="Spontaneous road trips from Fort Wayne. Pick a drive time and go.">
  <meta property="og:type" content="website">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
  <title>Unscheduled — Go when the feeling hits.</title>
</head>
<body>
  <div class="app">

    <!-- ── Header ─────────────────────────────────────── -->
    <header class="header" role="banner">
      <div class="logo-mark" aria-hidden="true">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="22" cy="22" r="20.5" stroke="currentColor" stroke-width="2"/>
          <!-- Compass rose -->
          <path d="M22 7 L25.5 18.5 L22 16.5 L18.5 18.5 Z" fill="currentColor"/>
          <path d="M22 37 L18.5 25.5 L22 27.5 L25.5 25.5 Z" fill="currentColor" opacity="0.35"/>
          <path d="M37 22 L25.5 25.5 L27.5 22 L25.5 18.5 Z" fill="currentColor" opacity="0.35"/>
          <path d="M7 22 L18.5 18.5 L16.5 22 L18.5 25.5 Z" fill="currentColor" opacity="0.35"/>
          <circle cx="22" cy="22" r="3" fill="currentColor"/>
          <circle cx="22" cy="22" r="1.5" fill="white"/>
        </svg>
      </div>
      <h1 class="logo-text">Unscheduled</h1>
      <p class="tagline">Go when the feeling hits.</p>
    </header>

    <!-- ── Filters ────────────────────────────────────── -->
    <main>
      <section class="filters" aria-label="Trip filters">

        <div class="filter-group">
          <label class="filter-label" id="drive-label">How far will you drive?</label>
          <div class="pill-selector" id="drive-selector" role="group" aria-labelledby="drive-label">
            <button class="pill" data-value="1">1 hr</button>
            <button class="pill" data-value="2">2 hrs</button>
            <button class="pill active" data-value="3">3 hrs</button>
            <button class="pill" data-value="4">4 hrs</button>
            <button class="pill" data-value="5">5 hrs</button>
            <button class="pill" data-value="6">6 hrs</button>
          </div>
        </div>

        <div class="filter-group">
          <label class="filter-label" id="vibe-label">What's the vibe?</label>
          <div class="pill-selector pill-selector--scroll" id="vibe-selector" role="group" aria-labelledby="vibe-label"></div>
        </div>

        <div class="filter-group">
          <label class="filter-label" id="when-label">When are you going?</label>
          <div class="pill-selector" id="when-selector" role="group" aria-labelledby="when-label">
            <button class="pill" data-value="tonight">Tonight</button>
            <button class="pill active" data-value="weekend">This Weekend</button>
            <button class="pill" data-value="flexible">Flexible</button>
          </div>
        </div>

        <button class="cta-button" id="show-button" type="button">
          Show me somewhere →
        </button>

      </section>

      <div class="results-divider" role="separator"></div>

      <!-- ── Results ──────────────────────────────────── -->
      <section
        class="results"
        id="results"
        aria-live="polite"
        aria-label="Destination results"
      ></section>
    </main>

    <!-- ── Footer ────────────────────────────────────── -->
    <footer class="footer" role="contentinfo">
      <p>Built for road trippers who don't need a plan.<br>
      Made with love in Fort Wayne, Indiana.</p>
    </footer>

  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
